<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to PulpCulture 🧃</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --carrot:    #E8601C;
      --carrot-lt: #F4884A;
      --carrot-bg: #FFF1E8;
      --indigo:    #3D2C8D;
      --indigo-lt: #6C5FC7;
      --indigo-bg: #EEEAF8;
      --ink:       #1A1220;
      --muted:     #5C5368;
      --line:      #E2D9F3;
      --white:     #FFFFFF;
      --cream:     #FDFAF6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem;
      text-align: center;
    }

    .juice-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounce 1.2s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 900;
      letter-spacing: -.02em;
      margin-bottom: .5rem;
    }
    .logo span { color: var(--carrot); }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--indigo);
      margin-bottom: .7rem;
    }

    .sub {
      font-size: 1rem;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.65;
    }

    .card {
      margin-top: 2rem;
      background: var(--white);
      border: 1.5px solid var(--line);
      border-radius: 18px;
      padding: 1.6rem 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 18px rgba(61,44,141,.10);
      text-align: left;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: .9rem;
    }
    .step-num {
      background: var(--carrot-bg);
      color: var(--carrot);
      font-size: .75rem;
      font-weight: 700;
      width: 26px;
      height: 26px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-text strong { font-size: .9rem; font-weight: 600; display: block; }
    .step-text span   { font-size: .82rem; color: var(--muted); }

    .back-link {
      margin-top: 2rem;
      font-size: .85rem;
      color: var(--muted);
    }
    .back-link a {
      color: var(--carrot);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="juice-icon">🧃</div>
  <div class="logo">Pulp<span>Culture</span></div>

  <h1>Welcome to the routine.</h1>
  <p class="sub">Your subscription request is in. We'll contact you shortly on WhatsApp with payment details and your first delivery date.</p>

  <div class="card">
    <div class="step">
      <div class="step-num">💬</div>
      <div class="step-text">
        <strong>We'll reach out on WhatsApp</strong>
        <span>Expect a message within 24 hours with payment details.</span>
      </div>
    </div>
  </div>

  <p class="back-link"><a href="index.html">← Back to plans</a></p>

</body>
</html>
